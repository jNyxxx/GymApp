name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: GymApp
        run: npm install

      - name: Prebuild Expo
        working-directory: GymApp
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: GymApp
        run: |
          cd ios
          pod install

      - name: Disable signing in Xcode project
        working-directory: GymApp
        run: |
          cd ios
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO;/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO;/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/' WeGoGym.xcodeproj/project.pbxproj

      - name: Build Archive
        working-directory: GymApp
        run: |
          xcodebuild \
            -workspace ios/WeGoGym.xcworkspace \
            -scheme WeGoGym \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/WeGoGym.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        working-directory: GymApp
        run: |
          mkdir -p $RUNNER_TEMP/payload/Payload
          cp -r "$RUNNER_TEMP/WeGoGym.xcarchive/Products/Applications/WeGoGym.app" "$RUNNER_TEMP/payload/Payload/"
          cd $RUNNER_TEMP/payload
          zip -r $RUNNER_TEMP/WeGoGym.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WeGoGym-ipa
          path: ${{ runner.temp }}/WeGoGym.ipa

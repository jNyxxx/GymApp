name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: GymApp
        run: npm install --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        working-directory: GymApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive --wait

      - name: Download IPA
        working-directory: GymApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json 2>/dev/null | jq -r '.[0].artifacts.buildUrl')
          if [ "$BUILD_URL" != "null" ] && [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o WeGoGym.ipa
          else
            echo "No build URL found, checking EAS dashboard..."
            eas build:list --platform ios --limit 1
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeGoGym-ipa
          path: GymApp/WeGoGym.ipa

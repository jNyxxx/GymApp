name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Prebuild Expo
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build IPA (no signing)
        run: |
          xcodebuild \
            -workspace ios/WeGoGym.xcworkspace \
            -scheme WeGoGym \
            -configuration Release \
            -archivePath $RUNNER_TEMP/WeGoGym.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p $RUNNER_TEMP/payload
          cp -r $RUNNER_TEMP/WeGoGym.xcarchive/Products/Applications/WeGoGym.app $RUNNER_TEMP/payload/Payload
          cd $RUNNER_TEMP
          zip -r WeGoGym.ipa payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WeGoGym-ipa
          path: ${{ runner.temp }}/WeGoGym.ipa


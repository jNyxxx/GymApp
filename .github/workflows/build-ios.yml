name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: GymApp
        run: npm install

      - name: Prebuild Expo
        working-directory: GymApp
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: GymApp
        run: |
          cd ios
          pod install

      - name: Disable signing in Xcode project
        working-directory: GymApp
        run: |
          cd ios
          # Disable signing in main project
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO;/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO;/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/' WeGoGym.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "";/' WeGoGym.xcodeproj/project.pbxproj
          # Also disable in Pods
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO;/' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO;/' Pods/Pods.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/' Pods/Pods.xcodeproj/project.pbxproj

      - name: Build Archive
        working-directory: GymApp
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/WeGoGym.xcworkspace \
            -scheme WeGoGym \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/WeGoGym.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" 2>&1 | tee $RUNNER_TEMP/build.log
          exit ${PIPESTATUS[0]}

      - name: Find archive location
        if: always()
        run: |
          echo "=== Searching for .xcarchive ==="
          find $RUNNER_TEMP -name "*.xcarchive" -type d 2>/dev/null || echo "No archive found in RUNNER_TEMP"
          echo "=== Searching in workspace ==="
          find GymApp -name "*.xcarchive" -type d 2>/dev/null || echo "No archive found in workspace"

      - name: Package IPA
        run: |
          ls -la "$RUNNER_TEMP/WeGoGym.xcarchive/Products/Applications/" || echo "Archive Products not found, listing archive:" && ls -la "$RUNNER_TEMP/WeGoGym.xcarchive/" || true
          mkdir -p $RUNNER_TEMP/payload/Payload
          cp -r "$RUNNER_TEMP/WeGoGym.xcarchive/Products/Applications/"*.app "$RUNNER_TEMP/payload/Payload/"
          cd $RUNNER_TEMP/payload
          zip -r $RUNNER_TEMP/WeGoGym.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WeGoGym-ipa
          path: ${{ runner.temp }}/WeGoGym.ipa
